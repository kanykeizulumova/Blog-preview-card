<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <div class="wrapper">
    <main>
      <article class="container">
        <div class="image-container">
          <img class="illustration" src="./assets/images/illustration-article.svg" alt="illustration article image">
        </div>
        <div class="content-container">
          <div class="category">
            <p class="preset3">Learning</p>
          </div>
          <p class="preset3 publ">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
          <h2 class="preset1 html">HTML & CSS foundations</h2>
          <p class="preset2 desc">These languages are the backbone of every website, defining structure, content, and
            presentation.</p>
        </div>
        <div class="author-container">
          <img class="userpic" src="./assets/images/image-avatar.webp">
          <p class="preset3">Greg Hooper</p>
        </div>
      </article>
    </main>
    <footer>
      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="https://github.com/kanykeizulumova">Kanykei Zulumova</a>.
      </div>
    </footer>
  </div>
</body>

</html>
